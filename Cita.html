<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita</title>
    <link rel="stylesheet" href="css/Cita.css">
</head>
<body>

    <header>

        <div class="logo">
            <a href="index.html">  
            <h1 class="titulo-logo">Blue Rock</h1>
            </a>
            <p>BELLEZA • CONFIANZA • BIENESTAR</p>
        </div>

    </header>

    <main class="Form-main">
        <div class="login-card">

            <!-- Formulario Previo a Cita -->
            <form class="login-form">

                <fieldset class="datos-form">
                <legend>DATOS PERSONALES</legend>
                    
                <div class="datos-gorm">

                    <label for="text">Nombres</label>
                        <input type="text" id="Nombres" placeholder="Mercado" required>
                    
                        <label for="text">Apellidos</label>
                        <input type="text" id="apellidos" placeholder="Mercado" required>
                    
                    </div>

                    <div class="datos-gorm">
                    <label for="text">Direccion</label> 
                        <textarea name="Direccion" id=""></textarea>
                    </div>

                </fieldset>





            </form>
        </div>
    </main>

</body>
</html>
